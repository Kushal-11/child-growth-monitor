name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "work"]
    paths:
      - "flutter_app/**"
      - ".github/workflows/flutter-android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flutter_app/android/gradle/wrapper/gradle-wrapper.properties', 'flutter_app/android/**/*.gradle*', 'flutter_app/android/**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Ensure Android platform folder is committed
        run: |
          if [ ! -d android ]; then
            echo "Missing flutter_app/android directory. Commit Android platform files before running this workflow."
            echo "This workflow intentionally does not auto-generate android/ to keep builds reproducible."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'http://10.0.2.2:8000' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: child-growth-monitor-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
