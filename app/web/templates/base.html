<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ t.default_page_title }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary d-print-none">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="/">
                <i class="bi bi-heart-pulse-fill me-1" aria-hidden="true"></i>{{ t.app_title }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarMain" aria-controls="navbarMain"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <div class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                    <a class="nav-link" href="/">
                        <i class="bi bi-camera me-1 d-none d-lg-inline" aria-hidden="true"></i>{{ t.nav_assess }}
                    </a>
                    <a class="nav-link" href="/children">
                        <i class="bi bi-people me-1 d-none d-lg-inline" aria-hidden="true"></i>{{ t.nav_children }}
                    </a>
                    <a class="nav-link" href="/docs" target="_blank" rel="noopener">
                        <i class="bi bi-file-earmark-code me-1 d-none d-lg-inline" aria-hidden="true"></i>{{ t.nav_api_docs }}
                    </a>
                    <div class="nav-item d-flex align-items-center ms-lg-2 mt-2 mt-lg-0 lang-toggle-wrap" role="group" aria-label="{{ t.lang_toggle_aria }}">
                        <span class="text-white-50 small me-2 d-none d-lg-inline"><i class="bi bi-translate" aria-hidden="true"></i></span>
                        <div class="btn-group btn-group-sm" role="group">
                            <button type="button" class="btn btn-outline-light lang-btn {% if lang == 'en' %}active{% endif %}"
                                    data-lang="en" aria-pressed="{{ 'true' if lang == 'en' else 'false' }}">{{ t.lang_en }}</button>
                            <button type="button" class="btn btn-outline-light lang-btn {% if lang == 'mr' %}active{% endif %}"
                                    data-lang="mr" aria-pressed="{{ 'true' if lang == 'mr' else 'false' }}">{{ t.lang_mr }}</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="container mt-5 mb-3 text-center text-muted d-print-none">
        <small>{{ t.footer_tagline }}</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function () {
        document.querySelectorAll('.lang-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var code = btn.getAttribute('data-lang');
                if (!code) return;
                document.cookie = 'lang=' + code + ';path=/;max-age=31536000;SameSite=Lax';
                location.reload();
            });
        });
    })();
    </script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
